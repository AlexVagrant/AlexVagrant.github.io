###########
# site.title

title: AlexVagrant
description: "Build, write, ship."
# baseurl: "/jekyllBear" # the subpath of your site, e.g. /blog/
url: "https://alexvagrant.github.io/" # the base hostname & protocol for your site
host: localhost


#########################
# more settings

plugins:
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

compress_html:
  clippings: all
  comments: [""]
  endings: [html, head, body, li, dt, dd, rt, rp, optgroup, option, colgroup, caption, thead, tbody, tfoot, tr, td, th]
  profile: false
  blanklines: false
  ignore:
    envs: []

collections:
  notes:
    output: false
  category:
    output: true
    permalink: /category/:slug/
  tag:
    output: true
    permalink: /tag/:tag/

#baseurl: ""
permalink: /posts/:title
timezone: Asia/Shanghai
future: true

exclude:
- README.md
- LICENSE.md

About: /about

# Add general links to site pages here
links:
  Resume: /assets/resume.pdf


# Add links for more focus here
special_links:
  "Search": https://duckduckgo.com

sass:
  sass_dir: _sass
  style:    compressed

theme_config:
  appearance: "auto"
  back_home_text: ".."
  date_format: "%Y-%m-%d"
  month_format: "%m-%d"
  show_description: true

google_analytics: "G-X2X1M5R9RD"
