<ul class="category">
	{% assign max_display = 10 %}
	{% assign count = 0 %}
	{% for tag in site.tags %}
		{% assign count = count | plus: 1 %}
		{% if count <= max_display %}
			{% assign tag_slug = tag | first %}
			<li>
				<a href="{{ 'tag/' | relative_url }}{{ tag_slug }}" title="See all posts by {{ tag_slug }} tags">{{ tag_slug }}</a>
			</li>
		{% endif %}
	{% endfor %}
</ul>
