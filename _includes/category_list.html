<ul class="category">
	{% for category in site.categories %}

	{% assign category_slug = category | first %}
	{% assign no_of_posts = category | last | size %}

	<li>
		<a href="{{ 'category/' | relative_url }}{{ category_slug }}" title="查看 {{ category_slug }} 分类下的所有文章">{{ category_slug }}</a>
	</li>
	{% endfor %}
</ul>
