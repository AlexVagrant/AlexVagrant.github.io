---
layout: default
---

{%-include back_link.html-%}

<div>
    <h1>标有 "{{ page.tag-name }}" 标签的文章</h1>
    <ul style="padding-top: 16px">
        {% for post in site.posts %} {% if post.tags contains page.tag-name %}
        <li>
            <a href="{{ post.url }}">{{ post.title }}</a>，发布于 {{
            post.date | date: "%Y-%m-%d" }}
        </li>
        {% endif %} {% endfor %}
    </ul>
</div>
